name: AllergyLab CI/CD

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: build images
      run: |
        cd Part7a
        docker build -t ${{ secrets.DOCKER_USER_NAME }}/al-app:latest ./app
        docker build -t ${{ secrets.DOCKER_USER_NAME }}/al-db-loader:latest ./db-loader
        docker build -t ${{ secrets.DOCKER_USER_NAME }}/al-email:latest ./email

    - name: Log in to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER_NAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Push images to DockerHub
      run: |
        docker push ${{ secrets.DOCKER_USER_NAME }}/al-app:latest
        docker push ${{ secrets.DOCKER_USER_NAME }}/al-db-loader:latest
        docker push ${{ secrets.DOCKER_USER_NAME }}/al-email:latest

  deploy:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
    - name: Run containers
      run: |
        docker run -d ${{ secrets.DOCKER_USER_NAME }}/al-app:latest
        docker run -d ${{ secrets.DOCKER_USER_NAME }}/al-db-loader:latest
        docker run -d ${{ secrets.DOCKER_USER_NAME }}/al-email:latest